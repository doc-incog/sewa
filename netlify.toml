[build]
  base = "client"
  command = "npm install && npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"
  NEXT_PUBLIC_API_URL = "https://sewa-backend-production.up.railway.app/api"

[[redirects]]
  from = "/providers"
  to = "/providers/index.html"
  status = 200

[[redirects]]
  from = "/service-detail"
  to = "/service-detail/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
