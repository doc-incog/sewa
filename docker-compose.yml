version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: sewa-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: sewa_admin
      MONGO_INITDB_ROOT_PASSWORD: sewa_password
      MONGO_INITDB_DATABASE: sewa
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
